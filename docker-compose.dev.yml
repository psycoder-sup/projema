services:
  postgres:
    image: postgres:15-alpine
    container_name: pm-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: project_managment
    volumes:
      - pm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_managment"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pm-postgres-data:
