services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    # Host port is configurable so multiple worktrees can run side-by-side.
    # Override in .env.local with: DEV_DB_PORT=5433
    ports:
      - "${DEV_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: project_managment
    volumes:
      - pm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d project_managment"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  pm-postgres-data:
